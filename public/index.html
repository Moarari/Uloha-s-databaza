<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Moji ľudia z databázy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }
        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        #mojDivVJs {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .card {
            width: 220px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            text-align: center;
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .card p {
            margin: 8px 0;
            font-size: 16px;
        }
        .deleteBtn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
        }
        .deleteBtn:hover { background: #a71d2a; }
        
        form {
            display: flex;
            flex-direction: column;
            width: 300px;
            margin: 0 auto 30px auto;
            gap: 10px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sorting-container {
            text-align: center;
            margin-bottom: 30px;
        }
        select, input, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button[type="submit"] {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button[type="submit"]:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>Ľudia z databázy</h1>

    <form id="addForm">
        <h2>Pridať človeka</h2>
        <input type="text" id="name" placeholder="Meno" required>
        <input type="number" id="age" placeholder="Vek" required>
        <input type="text" id="image" placeholder="URL obrázka" required>
        <button type="submit">Pridať</button>
    </form>

    <div class="sorting-container">
        <label for="sortSelect"><b>Zoradiť podľa:</b></label>
        <select id="sortSelect" onchange="loadPeople()">
            <option value="id">Pôvodné (podľa ID)</option>
            <option value="name-asc">Mena (A-Z)</option>
            <option value="name-desc">Mena (Z-A)</option>
            <option value="age-asc">Veku (Najmladší)</option>
            <option value="age-desc">Veku (Najstarší)</option>
        </select>
    </div>

    <div id="mojDivVJs"></div>

    <script src="script.js"></script>
</body>
</html>
