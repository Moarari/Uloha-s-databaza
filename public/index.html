<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Moji ľudia z databázy</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        #mojDivVJs {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            width: 220px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        .card p {
            margin: 8px 0;
            font-size: 16px;
        }

        .deleteBtn {
            background: red;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            width: 300px;
            margin: 0 auto 30px auto;
            gap: 10px;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Ľudia z Render databázy</h1>

    <h2>Pridať človeka</h2>

    <form id="addForm">
        <input type="text" id="name" placeholder="Meno" required>
        <input type="number" id="age" placeholder="Vek" required>
        <input type="text" id="image" placeholder="URL obrázka" required>
        <button type="submit">Pridať</button>
    </form>

    <div id="mojDivVJs"></div>

    <script src="script.js"></script>
</body>
</html>
