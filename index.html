<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Moji ľudia z databázy</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        #mojDivVJs {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            width: 220px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        .card p {
            margin: 8px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Ľudia z Render databázy</h1>

    <div id="mojDivVJs"></div>

    <script src="script.js"></script>
</body>
</html>
